services:
  - type: web
    name: abhyaas-erp-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BASE_URL
        sync: false
      - key: NODE_ENV
        value: production
    disk:
      name: uploads
      mountPath: /backend/uploads
      sizeGB: 1
